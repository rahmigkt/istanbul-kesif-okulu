<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Keşif Okulu — Yapım Aşamasında</title>
<meta name="robots" content="noindex, nofollow">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Cinzel:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Source Sans 3', Arial, sans-serif;
    background: radial-gradient(ellipse at center, #16213a 0%, #0e1626 70%);
    color:#f2ede0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .wrap{max-width:640px;}
  .mark{
    width:76px;height:76px;border:2px solid #c9a24b;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 28px;font-family:'Cinzel',serif;font-size:1.6rem;color:#c9a24b;
  }
  .eyebrow{
    font-family:'Cinzel',serif;letter-spacing:3px;font-size:0.78rem;
    color:#c9a24b;text-transform:uppercase;margin-bottom:18px;
  }
  h1{
    font-family:'Cormorant Garamond',serif;font-weight:600;font-style:italic;
    font-size:2.6rem;line-height:1.2;color:#f2ede0;margin-bottom:22px;
  }
  p{font-size:1.02rem;line-height:1.7;color:#c3c9d6;margin-bottom:10px;}
  .rule{width:70px;height:2px;background:#c9a24b;margin:26px auto;}
  .contact{margin-top:30px;font-size:0.92rem;color:#9aa3b8;}
  .contact a{color:#c9a24b;text-decoration:none;}
  .contact a:hover{text-decoration:underline;}
  @media (max-width:480px){ h1{font-size:2rem;} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">İK</div>
    <div class="eyebrow">İstanbul Keşif Okulu · School of Istanbul</div>
    <h1>Yapım Aşamasındadır</h1>
    <p>Sitemiz şu anda güncelleniyor. En kısa sürede, daha iyi bir deneyimle yeniden karşınızda olacağız.</p>
    <div class="rule"></div>
    <p>Anlayışınız için teşekkür ederiz.</p>
    <div class="contact">
      Sorularınız için: <a href="mailto:info@schoolofistanbul.com">info@schoolofistanbul.com</a>
    </div>
  </div>
</body>
</html>
